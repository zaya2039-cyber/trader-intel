// ─── HELPERS ──────────────────────────────────────────────────────────────────
function fmtUsd(n, decimals=2) {
  const abs = Math.abs(n);
  const sign = n < 0 ? '-' : '';
  if (abs >= 1_000_000) return `${sign}$${(abs/1_000_000).toFixed(1)}M`;
  if (abs >= 1_000) return `${sign}$${(abs/1_000).toFixed(1)}K`;
  return `${sign}$${abs.toFixed(decimals)}`;
}
function fmtPct(n) {
  const sign = n >= 0 ? '+' : '';
  return `${sign}${n.toFixed(1)}%`;
}
function shortAddr(addr) {
  if (!addr) return '—';
  return addr.slice(0,6) + '...' + addr.slice(-4);
}
function pnlColor(n) { return n >= 0 ? 'text-green-400' : 'text-red-400'; }
function pnlBg(n) { return n >= 0 ? 'bg-green-400/10 text-green-400' : 'bg-red-400/10 text-red-400'; }

// ─── HYPERLIQUID API ──────────────────────────────────────────────────────────
async function fetchLeaderboard(timeframe) {
  const tfMap = { '24h':'day', '7d':'week', '30d':'month', 'allTime':'allTime' };
  const res = await fetch(HL_API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ type: 'leaderboard' }),
  });
  if (!res.ok) throw new Error('Hyperliquid fetch failed');
  const data = await res.json();
  const rows = data.leaderboardRows || [];
  const tf = tfMap[timeframe] || 'week';
  return rows.slice(0, 50).map((r, i) => {
    const windowData = r.windowPerformances?.find(w => w[0] === tf)?.[1] || {};
    return {
      rank: i + 1,
      address: r.ethAddress || '',
      displayName: r.displayName || shortAddr(r.ethAddress),
      accountValue: parseFloat(r.accountValue || 0),
      pnl: parseFloat(windowData.pnl || 0),
      roi: parseFloat(windowData.roi || 0) * 100,
      volume: parseFloat(windowData.vlm || 0),
      allTimePnl: parseFloat(r.windowPerformances?.find(w=>w[0]==='allTime')?.[1]?.pnl || 0),
      openPositions: [],
      starred: false,
    };
  });
}

async function fetchPositions(address) {
  const res = await fetch(HL_API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ type: 'clearinghouseState', user: address }),
  });
  if (!res.ok) return [];
  const data = await res.json();
  return (data.assetPositions || [])
    .filter(p => p.position?.szi && parseFloat(p.position.szi) !== 0)
    .map(p => {
      const pos = p.position;
      const size = parseFloat(pos.szi || 0);
      const entry = parseFloat(pos.entryPx || 0);
      const upnl = parseFloat(pos.unrealizedPnl || 0);
      const lev = parseFloat(pos.leverage?.value || 1);
      return {
        coin: pos.coin,
        side: size > 0 ? 'LONG' : 'SHORT',
        size: Math.abs(size),
        entryPrice: entry,
        markPrice: entry + (upnl / Math.abs(size) || 0),
        unrealizedPnl: upnl,
        leverage: lev,
        roe: parseFloat(pos.returnOnEquity || 0) * 100,
      };
    });
}

  const [positions, setPositions] = useState(trader.openPositions || []);
  const [loadingPos, setLoadingPos] = useState(false);

  async function handleExpand() {
    if (!expanded && positions.length === 0) {
      setLoadingPos(true);
      try {
        const pos = await fetchPositions(trader.address);
        setPositions(pos);
      } catch(e) { setPositions([]); }
      setLoadingPos(false);
    }
    setExpanded(e => !e);
  }

  return (
    <>
      <tr className="row-hover" style={{borderBottom:'1px solid #1a1a2e',cursor:'pointer'}} onClick={handleExpand}>
        <td style={{padding:'12px 16px',color:'#475569',fontSize:13,width:50}}>{trader.rank}</td>
        <td style={{padding:'12px 16px'}}>
          <button onClick={e=>{e.stopPropagation();onToggleStar(trader.address);}}
            style={{background:'none',border:'none',cursor:'pointer',padding:'2px',marginRight:8,opacity:trader.starred?1:0.4}}>
            <icons.Star filled={trader.starred} size={14}/>
          </button>
          <span style={{fontFamily:'JetBrains Mono, monospace',fontSize:12,color:'#94a3b8'}}>{trader.displayName || shortAddr(trader.address)}</span>
        </td>
        <td style={{padding:'12px 16px',textAlign:'right'}}>
          <span className={`mono ${pnlColor(trader.pnl)}`} style={{fontSize:13,fontWeight:600}}>{fmtUsd(trader.pnl)}</span>
        </td>
        <td style={{padding:'12px 16px',textAlign:'right'}}>
          <span className={pnlColor(trader.roi)} style={{fontSize:13}}>{fmtPct(trader.roi)}</span>
        </td>
        <td style={{padding:'12px 16px',textAlign:'right'}}>
          <span style={{color:'#94a3b8',fontSize:13}}>{fmtUsd(trader.accountValue)}</span>
        </td>
        <td style={{padding:'12px 16px',textAlign:'right'}}>
          <span style={{color:'#64748b',fontSize:13}}>{fmtUsd(trader.volume, 0)}</span>
        </td>
        <td style={{padding:'12px 16px',textAlign:'center'}}>
          <a href={`https://app.hyperliquid.xyz/leaderboard`} target="_blank" rel="noopener noreferrer"
            onClick={e=>e.stopPropagation()}
            style={{color:'#475569',display:'inline-flex'}}>
            <icons.ExternalLink size={13}/>
          </a>
        </td>
        <td style={{padding:'12px 16px',textAlign:'center',color:'#475569'}}>
          {loadingPos ? <span style={{fontSize:11}}>…</span> : expanded ? <icons.ChevronUp size={14}/> : <icons.ChevronDown size={14}/>}
        </td>
      </tr>
      {expanded && (
        <tr>
          <td colSpan={8} style={{background:'#0d0d18',padding:0}}>
            <div className="fade-in" style={{padding:'12px 24px 16px 56px'}}>
              {positions.length === 0 ? (
                <div style={{color:'#475569',fontSize:13,padding:'8px 0'}}>No open positions</div>
              ) : (
                <table style={{width:'100%',borderCollapse:'collapse'}}>
                  <thead>
                    <tr style={{color:'#475569',fontSize:11}}>
                      <th style={{textAlign:'left',padding:'4px 8px',fontWeight:500}}>Coin</th>
                      <th style={{textAlign:'left',padding:'4px 8px',fontWeight:500}}>Side</th>
                      <th style={{textAlign:'right',padding:'4px 8px',fontWeight:500}}>Size</th>
                      <th style={{textAlign:'right',padding:'4px 8px',fontWeight:500}}>Entry</th>
                      <th style={{textAlign:'right',padding:'4px 8px',fontWeight:500}}>Unr. PnL</th>
                      <th style={{textAlign:'right',padding:'4px 8px',fontWeight:500}}>Lev</th>
                      <th style={{textAlign:'right',padding:'4px 8px',fontWeight:500}}></th>
                    </tr>
                  </thead>
                  <tbody>
                    {positions.map((pos, i) => (
                      <tr key={i} className="pos-row">
                        <td style={{padding:'6px 8px',fontWeight:600,fontSize:13}}>{pos.coin}</td>
                        <td style={{padding:'6px 8px'}}>
                          <span style={{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:4,
                            background:pos.side==='LONG'?'rgba(74,222,128,0.15)':'rgba(248,113,113,0.15)',
                            color:pos.side==='LONG'?'#4ade80':'#f87171'}}>
                            {pos.side}
                          </span>
                        </td>
                        <td style={{padding:'6px 8px',textAlign:'right',fontFamily:'monospace',fontSize:12,color:'#94a3b8'}}>{pos.size.toFixed(3)}</td>
                        <td style={{padding:'6px 8px',textAlign:'right',fontFamily:'monospace',fontSize:12,color:'#94a3b8'}}>${pos.entryPrice.toLocaleString(undefined,{maximumFractionDigits:2})}</td>
                        <td style={{padding:'6px 8px',textAlign:'right'}}>
                          <span className={`mono ${pnlColor(pos.unrealizedPnl)}`} style={{fontSize:12,fontWeight:600}}>{fmtUsd(pos.unrealizedPnl)}</span>
                        </td>
                        <td style={{padding:'6px 8px',textAlign:'right',fontSize:12,color:'#64748b'}}>{pos.leverage.toFixed(1)}x</td>
                        <td style={{padding:'6px 8px',textAlign:'right'}}>
                          <CopyBtn href={`https://app.hyperliquid.xyz/trade/${pos.coin}`}/>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>
          </td>
        </tr>
      )}
    </>
  );
}

// ─── CRYPTO TAB ───────────────────────────────────────────────────────────────
function CryptoTab({ traders, onToggleStar }) {
  if (traders.length === 0) return (
    <div style={{textAlign:'center',padding:'80px 20px',color:'#475569'}}>
      <icons.TrendingUp size={40}/>
      <p style={{marginTop:16}}>No traders found. Try adjusting your filters.</p>
    </div>
  );
  return (
    <div style={{overflowX:'auto'}}>
      <table style={{width:'100%',borderCollapse:'collapse',minWidth:700}}>
        <thead>
          <tr style={{background:'#0d0d18',borderBottom:'1px solid #1e1e2e'}}>
            {['#','Trader','PnL','ROI %','Acct Value','Volume','',''].map((h,i)=>(
              <th key={i} style={{padding:'10px 16px',textAlign:i>1?'right':'left',fontSize:11,fontWeight:500,color:'#475569',textTransform:'uppercase',letterSpacing:'0.05em',whiteSpace:'nowrap',

                {h}

}

                <th key={i} style={{padding:'10px 16px',textAlign:i>1?'right':'left',fontSize:11,fontWeight:500,color:'#475569',textTransform:'uppercase',letterSpacing:'0.05em',

// ─── WATCHLIST TAB ────────────────────────────────────────────────────────────
function WatchlistTab({ cryptoTraders, kalshiTraders, onToggleStar }) {
  if (cryptoTraders.length === 0 && kalshiTraders.length === 0) {
    return (
      <div style={{textAlign:'center',padding:'80px 20px',color:'#475569'}}>
        <icons.Star filled={false} size={40}/>
        <p style={{marginTop:16,fontSize:15}}>No starred traders yet</p>
        <p style={{fontSize:13,marginTop:4}}>Click the ★ next to any trader to add them to your watchlist</p>

  }
  return (
    <div>
      {cryptoTraders.length > 0 && (
        <div>
          <div style={{padding:'12px 16px 4px',fontSize:11,fontWeight:600,color:'#475569',textTransform:'uppercase',letterSpacing:'0.08em'}}>

          <KalshiTab traders={kalshiTraders} onToggleStar={onToggleStar}/>
        </div>
      )}
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [activeTab, setActiveTab] = useState('crypto');
  const [cryptoTraders, setCryptoTraders] = useState([]);
  const [kalshiTraders, setKalshiTraders] = useState(KALSHI_TRADERS);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [lastUpdated, setLastUpdated] = useState(null);
  const [autoRefresh, setAutoRefresh] = useState(true);
  const [starred, setStarred] = useState(() => {
    try { return JSON.parse(localStorage.getItem('trader-intel-starred') || '[]'); } catch { return []; }
  });
  const [filters, setFilters] = useState({
    search: '',
    timeframe: '7d',
    sortBy: 'pnl',
    sortDir: 'desc',
    minPnl: 0,
  });

  // Save starred to localStorage
  useEffect(() => {
    localStorage.setItem('trader-intel-starred', JSON.stringify(starred));
  }, [starred]);

  function toggleStar(id) {
    setStarred(prev => prev.includes(id) ? prev.filter(s=>s!==id) : [...prev, id]);
  }

  // Fetch crypto leaderboard
  const fetchCrypto = useCallback(async () => {
    setLoading(true);
    setError(null);
    try {
      const traders = await fetchLeaderboard(filters.timeframe);
      setCryptoTraders(traders);
      setLastUpdated(new Date().toISOString());
    } catch(e) {
      setError('Failed to load Hyperliquid data. ' + e.message);
    }
    setLoading(false);
  }, [filters.timeframe]);

  useEffect(() => { fetchCrypto(); }, [fetchCrypto]);

  // Auto-refresh every 60s
  useEffect(() => {
    if (!autoRefresh) return;
    const interval = setInterval(fetchCrypto, 60000);
    return () => clearInterval(interval);
  }, [autoRefresh, fetchCrypto]);

  // Apply filters & sort to crypto traders
  const filteredCrypto = cryptoTraders
    .map(t => ({...t, starred: starred.includes(t.address)}))
    .filter(t => {
      if (filters.search) {
        const q = filters.search.toLowerCase();
        if (!t.address.toLowerCase().includes(q) && !(t.displayName||'').toLowerCase().includes(q)) return false;
      }
      if (filters.minPnl && t.pnl < filters.minPnl) return false;
      return true;
    })
    .sort((a,b) => {
      const dir = filters.sortDir === 'desc' ? -1 : 1;
      const field = filters.sortBy;
      return (a[field] - b[field]) * dir;
    });

  // Apply filters & sort to kalshi traders
  const filteredKalshi = KALSHI_TRADERS
    .map(t => ({...t, starred: starred.includes('k:'+t.id)}))
    .filter(t => {
      if (filters.search) {
        const q = filters.search.toLowerCase();
        if (!t.name.toLowerCase().includes(q)) return false;
      }
      return true;
    })
    .sort((a,b) => {
      const dir = filters.sortDir === 'desc' ? -1 : 1;
      const field = filters.sortBy === 'pnl' ? 'allTimePnl' : filters.sortBy === 'roi' ? 'winRate' : filters.sortBy;
      return (a[field] - b[field]) * dir;
    });

  const watchlistCrypto = filteredCrypto.filter(t => t.starred);
  const watchlistKalshi = filteredKalshi.filter(t => t.starred);
  const watchlistCount = watchlistCrypto.length + watchlistKalshi.length;

  return (
    <div style={{minHeight:'100vh',background:'#0a0a0f'}}>
      <Header
        lastUpdated={lastUpdated}
        loading={loading}
        onRefresh={fetchCrypto}
        autoRefresh={autoRefresh}
        setAutoRefresh={setAutoRefresh}
      />
      <TabBar activeTab={activeTab} setActiveTab={setActiveTab} watchlistCount={watchlistCount}/>
      {activeTab !== 'watchlist' && (
        <FilterBar filters={filters} setFilters={setFilters} activeTab={activeTab}/>
      )}

      <main style={{maxWidth:1400,margin:'0 auto'}}>
        {error && (
          <div style={{margin:'16px',padding:'12px 16px',background:'rgba(239,68,68,0.1)',border:'1px solid rgba(239,68,68,0.3)',borderRadius:8,color:'#f87171',fontSize:13}}>
            {error}
          </div>
        )}

        {loading && cryptoTraders.length === 0 ? (
          <div style={{textAlign:'center',padding:'80px 20px',color:'#475569'}}>
            <div style={{fontSize:24,marginBottom:16}}>⟳</div>
            <p>Loading leaderboard data…</p>
          </div>
        ) : (
          <>
            {activeTab === 'crypto' && <CryptoTab traders={filteredCrypto} onToggleStar={toggleStar}/>}
            {activeTab === 'kalshi' && <KalshiTab traders={filteredKalshi} onToggleStar={toggleStar}/>}
            {activeTab === 'watchlist' && (
              <WatchlistTab
                cryptoTraders={watchlistCrypto}
                kalshiTraders={watchlistKalshi}
                onToggleStar={toggleStar}
              />
            )}
          </>
        )}
      </main>

      <footer style={{borderTop:'1px solid #1e1e2e',padding:'16px',marginTop:40,textAlign:'center',fontSize:12,color:'#334155'}}>
        Crypto data: Hyperliquid public API (live) &nbsp;·&nbsp; Prediction data: mock (Kalshi CORS blocks browser) &nbsp;·&nbsp; Not financial advice
      </footer>

      <style>{`
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
